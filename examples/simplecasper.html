<html>

<body>
  <style>
    #floatBox {
      width: 80px;
      height: 30px;
      font-size: 18px;
      text-align: right;
      padding: 5px;
      border: 1px solid #999;
      border-radius: 4px;
    }
  </style>
  <script>
    const svgNamespace = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNamespace, "svg");
    const window_width = 800;
    const window_height = 800;
    let num_nodes = 0;
    const line_weight = 1;


    /* Set SVG attributes (e.g., width and height, adjust as needed) */
    svg.setAttribute("width", `${window_width}px`);
    svg.setAttribute("height", `${window_height}px`);
    svg.setAttribute("style", "border: 1px solid black;");
    document.body.appendChild(svg);
    const ctrlState = document.createElement('pre');
    ctrlState.innerText = "controller state";
    ctrlState.setAttribute("id", "controllers");
    document.body.appendChild(ctrlState);

    // Function to convert z-depth to gray shade
    function zToGrayShade(z) {
      // Normalize z value (assuming z is between -1 and 1, adjust as needed)
      // Higher z values = lighter gray, lower z values = darker gray
      const normalized = (z + 1) / 2; // Convert from [-1,1] to [0,1]
      const grayValue = Math.floor(normalized * 255); // Convert to 0-255 range
      return `rgb(${grayValue}, ${grayValue}, ${grayValue})`;
    }

    function createNode(node, index) {
      const [x, y, z] = node;

      const group = document.createElementNS(svgNamespace, "g");
      group.setAttribute("id", `node-${index}`);
      group.setAttribute("transform", `translate(${x * window_width}, ${y * window_height})`);
      svg.appendChild(group);

      const circle = document.createElementNS(svgNamespace, "circle");
      circle.setAttribute("r", "10");
      circle.setAttribute("fill", zToGrayShade(z));
      circle.setAttribute("data-z", z); // Store z value for updates
      group.appendChild(circle);

      const text = document.createElementNS(svgNamespace, "text");
      text.setAttribute("fill", "black");
      text.setAttribute("font-size", "24");
      text.setAttribute("dy", "0.35em");  // Vertically center
      text.setAttribute("x", "15");       // Offset to the right
      text.textContent = String(index);
      group.appendChild(text);

      enableDrag(group, index);  // Apply drag to group
    };

    function enableDrag(circle, node_id) {
      let isDragging = false;
      let frame_num = 0;
      var rest;

      function onMouseMove(e) {
        if (!isDragging) return;
        const rect = svg.getBoundingClientRect();
        const x = (e.clientX - rect.left) / window_width;
        const y = (e.clientY - rect.top) / window_height;
        
        // Get current z value from the circle element
        const group = document.getElementById(`node-${node_id}`);
        const circleElement = group.querySelector('circle');
        const z = parseFloat(circleElement.getAttribute('data-z')) || 0.0;

        // Update node position
        updateNode({ node_id, x, y, z });

        frame_num = frame_num + 1;

        rest = frame_num % 32;

        // Optionally: send to OCaml over WebSocket
        if (socket.readyState === WebSocket.OPEN && rest === 0) {
          socket.send(JSON.stringify({ drag: { node_id, x, y, z } }));
        }
      }

      function onMouseUp() {
        isDragging = false;
        window.removeEventListener("mousemove", onMouseMove);
        window.removeEventListener("mouseup", onMouseUp);
      }

      circle.addEventListener("mousedown", (e) => {
        isDragging = true;
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", onMouseUp);
      });
    }


    function updateNode(node) {
      const { node_id, x, y, z } = node;
      const group = document.getElementById(`node-${node_id}`);
      if (group) {
        group.setAttribute("transform", `translate(${x * window_width}, ${y * window_height})`);
        
        // Update circle color based on z value if z is provided
        if (z !== undefined) {
          const circleElement = group.querySelector('circle');
          if (circleElement) {
            circleElement.setAttribute("fill", zToGrayShade(z));
            circleElement.setAttribute("data-z", z);
          }
        }
        
        updateConnectedEdges(x, y, node_id);
      } else {
        console.log('cannot find group' + node_id);
      }
    }


    function updateConnectedEdges(x, y, index) {
      for (let i = 0; i < num_nodes; i++) {
        if (true) {
          const startIndex = (index * num_nodes) + i;
          const targetIndex = (i * num_nodes) + index;
          //console.log(`start-target: ${startIndex} , ${targetIndex}` );
          updateEdgePositionStart(x, y, startIndex);
          updateEdgePositionTarget(x, y, targetIndex);
        }

      }
    }


    function updateEdge(edge, index) {
      const line = document.getElementById(`edge-${index}`);
      if (line) {
        const { start, target, weight } = edge;
        line.setAttribute("stroke-width", weight * line_weight);
      } else {
        console.log(`edge/line not found: ${edge}`);
      }
    };

    function updateText(txt) {
      const element = document.getElementById("controllers");
      if (element) {
        element.innerText = txt;
      } else {
        console.log('could not find element');
      }
    };

    function updateEdgePositionStart(startX, startY, idx) {
      // update the start position of edge with index idx
      const edgeId = `edge-${idx}`;
      const line = document.getElementById(edgeId);
      if (line) {
        line.setAttribute("x1", startX * window_width);
        line.setAttribute("y1", startY * window_height);
        //console.log('what');
      } else {
        console.log('cannot find edge', edgeId);
      }

    };

    function updateEdgePositionTarget(targetX, targetY, idx) {
      // update the start position of edge with index idx
      const edgeId = `edge-${idx}`;
      const line = document.getElementById(edgeId);
      if (line) {
        line.setAttribute("x2", targetX * window_width);
        line.setAttribute("y2", targetY * window_height);
      }
      else {
        console.log('no edge target');
      }
    };


    function getNodeCoordinates(nodeId) {
      const circle = document.getElementById(nodeId);
      if (!circle) {
        console.error(`Node with ID "${nodeId}" not found`);
        return null;
      }

      const cx = parseFloat(circle.getAttribute("cx"));
      const cy = parseFloat(circle.getAttribute("cy"));

      return [cx, cy];
    }

    function createEdge(edge, index) {
      const { start, target, weight } = edge;
      const id_a = `node-${start}`;
      const id_b = `node-${target}`;
      const [startX, startY] = [0, 0]; // we just put them somewhere, they will get updated anyway getNodeCoordinates(id_a);
      const [targetX, targetY] = [0, 0]// getNodeCoordinates(id_b);

      /* Create a line for the edge */
      const line = document.createElementNS(svgNamespace, "line");
      line.setAttribute("x1", startX);
      line.setAttribute("y1", startY);
      line.setAttribute("x2", targetX);
      line.setAttribute("y2", targetY);
      line.setAttribute("stroke", "black");
      line.setAttribute("stroke-width", weight * line_weight);
      line.setAttribute("id", `edge-${index}`);


      svg.appendChild(line);
    }


    let drawGraph = function (data) {
      /* Extract nodes and edges from the data */
      json = JSON.parse(data);
      const nodes = json.nodes;
      const edges = json.edges;

      document.body.appendChild(svg);
    };


    var socket = new WebSocket("ws://" + window.location.host + "/websocket");

    socket.onopen = function () {
      socket.send('init');
    };

    function init(state) {
      state.nodes.forEach(createNode);
      state.edges.forEach(createEdge);
      num_nodes = state.num_nodes;
      //console.log('num nodes is now', num_nodes, state);
      setInterval(() => {
        socket.send('tick');
      }, 80);
    }

    function update(state) {
      state.updated_nodes.forEach(updateNode);
      state.edges.forEach(updateEdge);
      //console.log(state.controllers);
      updateText(state.controllers);
    }

    socket.onmessage = function (e) {
      let object = JSON.parse(e.data);
      if (object == null) {
        console.log('json decode fail');
      } else if (object.init) {
        init(object.init);
      } else if (object.update) {
        //console.log('update');
        update(object.update);
      } else {
        console.log('do not understand message ' + object);
      };
    };



    function createFloatNumberBox(socket) {
      let createElement = function () {
        const floatBox = document.createElement('input');
        floatBox.setAttribute('type', 'number');
        floatBox.setAttribute('id', 'floatBox');
        floatBox.setAttribute('step', '0.01');
        floatBox.setAttribute('value', '0.0');

        // Optionally, apply some styling or positioning if needed
        floatBox.style.margin = '10px';

        // Append it to the DOM — for example, below the SVG
        document.body.appendChild(floatBox);
        //console.log('floatbox', floatBox);

        return floatBox;
      };

      const element = createElement();


      element.addEventListener('change', () => {
        const value = parseFloat(element.value);
        console.log('avlue',value);
        if (!isNaN(value)) {
          socket.send(encoder(value));
          console.log(encoder(value));
        }
      });




      let encoder = function (x) {
        return JSON.stringify({ 'brownian': { 'amount': x } });
      }


      let isDragging = false;
      let startY = 0;
      let startValue = 0;

      const onMouseMove = (e) => {
        if (!isDragging) return;

        const deltaY = startY - e.clientY;
        let sensitivity = 0.0001;
        if (e.shiftKey) sensitivity = 0.001;
        if (e.altKey) sensitivity = 0.001;

        const newValue = parseFloat((startValue + deltaY * sensitivity).toFixed(4));
        element.value = newValue;
        socket.send(encoder(newValue));
      };

      const onMouseUp = () => {
        if (isDragging) {
          isDragging = false;
          document.body.style.cursor = 'default';
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        }
      };

      element.addEventListener('mousedown', (e) => {
        isDragging = true;
        startY = e.clientY;
        startValue = parseFloat(element.value) || 0.0;
        document.body.style.cursor = 'ns-resize';
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        e.preventDefault();
      });
    };

    createFloatNumberBox(socket);


  </script>
</body>

</html>
