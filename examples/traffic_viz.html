<!DOCTYPE html>
<html>
<head>
  <title>2D Traffic Simulation</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: monospace;
    }
    canvas {
      border: 2px solid #444;
      display: block;
      margin: 20px auto;
      background: #000;
    }
    #info {
      text-align: center;
      font-size: 16px;
      margin: 10px;
    }
    #controls {
      max-width: 800px;
      margin: 20px auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
    }
    .control-row {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }
    .control-row label {
      flex: 1;
      margin-right: 10px;
    }
    .control-row input {
      flex: 2;
      margin-right: 10px;
    }
    .control-row span {
      flex: 0 0 60px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <canvas id="canvas" width="800" height="800"></canvas>
  <div id="controls">
    <h3>Parameters</h3>
    <div class="control-row">
      <label>Max Speed:</label>
      <input type="range" id="max_speed" min="10" max="150" step="5" value="60">
      <span id="max_speed_val">60</span>
    </div>
    <div class="control-row">
      <label>Max Force:</label>
      <input type="range" id="max_force" min="50" max="300" step="10" value="150">
      <span id="max_force_val">150</span>
    </div>
    <div class="control-row">
      <label>Separation Radius:</label>
      <input type="range" id="separation_radius" min="1" max="20" step="0.5" value="5">
      <span id="separation_radius_val">5</span>
    </div>
    <div class="control-row">
      <label>Alignment Radius:</label>
      <input type="range" id="alignment_radius" min="1" max="60" step="0.1" value="30">
      <span id="alignment_radius_val">30</span>
    </div>
    <div class="control-row">
      <label>Cohesion Radius:</label>
      <input type="range" id="cohesion_radius" min="1" max="20" step="0.5" value="5">
      <span id="cohesion_radius_val">5</span>
    </div>
     <div class="control-row">
      <label>Rotation when "bored"</label>
      <input type="range" id="rotation_amount" min="0.0" max="1.0" step="0.01" value="0.0">
      <span id="rotation_amount_val">0.0</span>
    </div>
    <div class="control-row">
      <label>dt step size</label>
      <input type="range" id="dt_step" min="0.0" max="0.1" step="0.0001" value="0.01">
      <span id="dt_step_val">0.01</span>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');

    // Parameter controls
    const params = ['max_speed', 'max_force', 'separation_radius', 'alignment_radius', 'cohesion_radius', 'rotation_amount','dt_step'];
    let isUserInteracting = false;

    params.forEach(param => {
      const slider = document.getElementById(param);
      const display = document.getElementById(param + '_val');

      slider.addEventListener('mousedown', () => { isUserInteracting = true; });
      slider.addEventListener('mouseup', () => { isUserInteracting = false; });
      slider.addEventListener('touchstart', () => { isUserInteracting = true; });
      slider.addEventListener('touchend', () => { isUserInteracting = false; });

      slider.addEventListener('input', () => {
        display.textContent = slider.value;
        writeParams();
      });
    });

    // Poll parameters from server and update UI
    function updateUIFromParams() {
      if (isUserInteracting) return; // Don't update while user is dragging

      fetch('/get_params')
        .then(r => r.json())
        .then(data => {
          params.forEach(param => {
            if (data[param] !== undefined) {
              const slider = document.getElementById(param);
              const display = document.getElementById(param + '_val');
              slider.value = data[param];
              display.textContent = data[param];
            }
          });
        })
        .catch(error => {
          console.error('Error fetching parameters:', error);
        });
    }

    // Poll params every second
    setInterval(updateUIFromParams, 1000);
    updateUIFromParams(); // Initial load

    function writeParams() {
      const data = {
        max_speed: parseFloat(document.getElementById('max_speed').value),
        max_force: parseFloat(document.getElementById('max_force').value),
        separation_radius: parseFloat(document.getElementById('separation_radius').value),
        alignment_radius: parseFloat(document.getElementById('alignment_radius').value),
        cohesion_radius: parseFloat(document.getElementById('cohesion_radius').value),
        rotation_amount: parseFloat(document.getElementById('rotation_amount').value),
        dt_step: parseFloat(document.getElementById('dt_step').value),
      };

      // Send to Flask server which writes to /tmp/traffic_params.json
      fetch('/update_params', {
        method: 'POST',
        body: JSON.stringify(data),
        headers: {'Content-Type': 'application/json'}
      })
      .then(response => response.json())
      .then(result => {
        console.log('Parameters updated:', result);
      })
      .catch(error => {
        console.error('Error updating parameters:', error);
      });
    }

    function drawSimulation() {
      fetch('traffic_data.json?' + new Date().getTime())
        .then(r => r.json())
        .then(data => {
          // Clear canvas
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, 800, 800);

          // Draw grid
          ctx.strokeStyle = '#eee';
          ctx.lineWidth = 1;
          const gridSize = 50;
          for (let i = 0; i <= 800; i += gridSize) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, 800);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(800, i);
            ctx.stroke();
          }

          // Draw bicycles
          data.bicycles.forEach(b => {
            const x = b.position.x * 800 / data.world_size;
            const y = b.position.y * 800 / data.world_size;
            const speed = Math.sqrt(b.velocity.x ** 2 + b.velocity.y ** 2);
            const speedFactor = speed / data.max_speed;

            // Color based on speed (blue=slow, green=medium, red=fast)
            let r, g, blue;
            if (speedFactor < 0.5) {
              blue = Math.floor((1 - speedFactor * 2) * 255);
              g = Math.floor(speedFactor * 2 * 255);
              r = 0;
            } else {
              blue = 0;
              g = Math.floor((1 - (speedFactor - 0.5) * 2) * 255);
              r = Math.floor((speedFactor - 0.5) * 2 * 255);
            }
            ctx.fillStyle = `rgb(${r},${g},${blue})`;

            // Draw stability ring if counter > 0
            if (b.stability_counter > 0) {
              const stabilityFactor = b.stability_counter / 100.0;  // 100 is trigger
              const ringRadius = 6 + (stabilityFactor * 6);  // Grows from 6 to 12

              // Color: green -> yellow -> red as stability increases
              let ringR, ringG;
              if (stabilityFactor < 0.5) {
                ringR = Math.floor(stabilityFactor * 2 * 255);
                ringG = 255;
              } else {
                ringR = 255;
                ringG = Math.floor((1 - (stabilityFactor - 0.5) * 2) * 255);
              }

              ctx.strokeStyle = `rgb(${ringR},${ringG},0)`;
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(x, y, ringRadius, 0, Math.PI * 2);
              ctx.stroke();
            }

            // Draw circle
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw velocity vector
            const angle = Math.atan2(b.velocity.y, b.velocity.x);
            const vx = x + Math.cos(angle) * speed * 0.5;
            const vy = y + Math.sin(angle) * speed * 0.5;

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(vx, vy);
            ctx.stroke();

            // Draw arrow head
            ctx.beginPath();
            ctx.moveTo(vx, vy);
            ctx.lineTo(vx - 5 * Math.cos(angle - 0.5), vy - 5 * Math.sin(angle - 0.5));
            ctx.moveTo(vx, vy);
            ctx.lineTo(vx - 5 * Math.cos(angle + 0.5), vy - 5 * Math.sin(angle + 0.5));
            ctx.stroke();
          });

          // Update info
          info.textContent = `Step: ${data.step} | Bicycles: ${data.count} | Avg speed: ${data.avg_speed.toFixed(2)} |`;
        })
        .catch(e => {
          info.textContent = 'Waiting for simulation data...';
        });
    }

    setInterval(drawSimulation, 100);
    drawSimulation();
  </script>
</body>
</html>
